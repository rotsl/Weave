# GitHub Actions workflow for publishing @rotsl/weave to npm
# This workflow publishes the Weave package to npm only when manually triggered

name: Publish Weave to npm

on:
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./packages/weave
        run: bun install

      - name: Build package
        working-directory: ./packages/weave
        run: bun run build

      - name: Run tests (if available)
        working-directory: ./packages/weave
        run: bun test || echo "No tests configured"
        continue-on-error: true

      - name: Publish to npm
        working-directory: ./packages/weave
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Optional: Also publish to GitHub Packages
  publish-gpr:
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./packages/weave
        run: bun install

      - name: Build package
        working-directory: ./packages/weave
        run: bun run build

      - name: Publish to GitHub Packages
        working-directory: ./packages/weave
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
