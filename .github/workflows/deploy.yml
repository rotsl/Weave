# GitHub Actions workflow for deploying Weave Editor to GitHub Pages
# This workflow builds the Next.js application as a static site and deploys it
# Users can then access the Weave editor at https://<username>.github.io/<repo>/

name: Deploy Weave Editor to GitHub Pages

on:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically detect the base path from the repository name
          static_site_generator: next

      - name: Build with Next.js (Static Export)
        run: |
          # Build the static site with base path for GitHub Pages
          # The base path is automatically set by configure-pages action
          NEXT_STATIC_BASE_PATH=${{ steps.pages.outputs.base_path }} bun run build:static
        env:
          NEXT_STATIC: 'true'
          GITHUB_PAGES: 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
