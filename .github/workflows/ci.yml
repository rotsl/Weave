# GitHub Actions CI workflow
# Runs linting and tests only when manually triggered

name: CI

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  build-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for testing
        run: bun run build
        env:
          NEXT_STATIC: 'false'

  build-package:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./packages/weave
        run: bun install

      - name: Build Weave package
        working-directory: ./packages/weave
        run: bun run build

      - name: Verify package build
        working-directory: ./packages/weave
        run: |
          if [ -d "dist" ]; then
            echo "✅ Package built successfully"
            ls -la dist/
          else
            echo "❌ Package build failed - dist directory not found"
            exit 1
          fi

  # Optional: Run type checking
  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript type check
        run: bunx tsc --noEmit || echo "Type check completed with warnings"
        continue-on-error: true
